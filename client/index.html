<!-- client/index.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insights — AI Sentiment Analysis</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Hero Band -->
  <header class="hero-band">
    <span class="eyebrow">감정 데이터 분석 플랫폼</span>
    <h1>데이터로 읽는 <br>마음의 깊이.</h1>
  </header>

  <main class="container">
    <!-- 1. 로그인/회원가입 섹션 (인증 폼 카드) -->
    <section id="login-section" class="section is-active">
      <div class="card-feature">
        <h2 id="auth-title" style="font-size: 24px; margin-bottom: 24px; font-weight: 500;">로그인</h2>
        <form id="auth-form">
          <div class="form-group">
            <label for="email">이메일 주소</label>
            <input type="email" id="email" placeholder="name@company.com" required>
          </div>
          <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>
          <button type="submit" id="auth-submit-btn" class="button-primary">계속하기</button>
          <p id="auth-error" class="error-text"></p>
        </form>
        <div style="margin-top: 20px; text-align: center; font-size: 14px;">
          <span id="auth-toggle-text">계정이 없으신가요?</span>
          <button id="auth-toggle-btn" class="button-secondary" style="border: none; padding: 0; color: var(--colors-accent-blue); text-decoration: underline; cursor: pointer;">회원가입하기</button>
        </div>
      </div>
    </section>

    <!-- 2. 대시보드 섹션 -->
    <section id="main-section" class="section" style="max-width: 800px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
        <span class="eyebrow" style="margin-bottom: 0;">대시보드</span>
        <button id="logout-btn" class="button-secondary">로그아웃</button>
      </div>

      <div class="card-feature" style="margin-bottom: 48px;">
        <h3 style="font-size: 20px; margin-bottom: 16px; font-weight: 500;">새로운 분석</h3>
        <div class="form-group">
          <textarea id="analyze-text" rows="5" placeholder="분석하고 싶은 문장을 입력해 주세요..."></textarea>
        </div>
        <button id="analyze-btn" class="button-primary" style="width: auto;">분석 시작하기</button>
        <p id="analyze-error" class="error-text" style="text-align: left;"></p>
      </div>

      <span class="eyebrow">최근 분석 기록</span>
      <div id="history-list">
        <!-- 유색 카테고리 카드가 이곳에 추가됩니다 -->
      </div>
    </section>
  </main>

  <!-- 결과 모달 -->
  <dialog id="result-modal">
    <span class="eyebrow">분석 완료</span>
    <div id="result-content" style="margin: 24px 0;">
      <h2 id="res-sentiment" style="font-size: 32px; margin-bottom: 8px;">긍정</h2>
      <p style="font-size: 14px; color: var(--colors-mute);">분석 신뢰도: <span id="res-confidence">0</span>%</p>
      <p id="res-reason" style="margin-top: 16px; font-size: 15px; color: var(--colors-body);"></p>
    </div>
    <button id="close-modal-btn" class="button-primary">확인</button>
  </dialog>

  <!-- Loading State -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <!-- Toast Notification -->
  <div id="toast-container" style="position: fixed; bottom: 20px; right: 20px; z-index: 2000;"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
